services:
  core-server:
    build: ./apps/core-server
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/core-server/app/logs:/app/app/logs

  celery-worker:
    build: ./apps/core-server
    env_file: .env.example
    command: celery -A app.jobs.celery_app worker -l info
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: ./apps/core-server
    env_file: .env.example
    command: celery -A app.jobs.celery_app beat -l info
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: storeops
      POSTGRES_USER: storeops
      POSTGRES_PASSWORD: storeops_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/storeops.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - core-server

volumes:
  postgres-data:
